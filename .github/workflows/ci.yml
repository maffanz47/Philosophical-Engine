name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black

      - name: Check ruff
        run: ruff check .

      - name: Check black
        run: black --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov httpx

      - name: Run pytest
        run: pytest tests/ -v --cov=app --cov=ml --cov-report=xml --cov-report=term-missing

      - name: Run DeepChecks data integrity suite
        run: |
          python -c "
          import sys
          try:
              from deepchecks import Dataset
              import pandas as pd
              # Create sample data for integrity check
              df = pd.DataFrame({
                  'gutenberg_id': range(100, 110),
                  'title': [f'Book {i}' for i in range(10)],
                  'school_label': ['Empiricism'] * 5 + ['Rationalism'] * 5
              })
              ds = Dataset(df, cat_features=['school_label'])
              from deepchecks.tabular import SingleValue
              result = SingleValue().run(ds)
              print('DeepChecks integrity check passed')
          except ImportError:
              print('DeepChecks not available, skipping')
              sys.exit(0)
          "

      - name: Check model F1 threshold
        run: |
          python -c "
          import json
          import os
          # Check if metrics JSON exists from previous runs
          metrics_file = 'reports/metrics.json'
          if os.path.exists(metrics_file):
              with open(metrics_file, 'r') as f:
                  metrics = json.load(f)
              f1 = metrics.get('classification_f1', 0)
              if f1 < 0.70:
                  raise Exception(f'F1 regression detected: {f1} < 0.70')
              print(f'F1 score: {f1}')
          else:
              print('No previous metrics found, skipping regression check')
          "

  validate-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t philosophical-engine:test -f docker/Dockerfile .

      - name: Verify image
        run: docker run --rm philosophical-engine:test python --version
