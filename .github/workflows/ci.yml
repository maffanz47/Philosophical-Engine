name: CI Pipeline

on:
  push:
    branches: [ main, Hassan ]  # Added your branch name here
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # This makes it faster by remembering your libraries

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm # Needed for your spacy code

      - name: Run tests
        run: pytest tests/ -v