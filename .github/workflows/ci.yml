name: CI

on:
  push:
  pull_request:

jobs:
  test-validate-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest
        run: pytest -q

      - name: Run Deepchecks scaffold
        run: python -c "from tests.deepchecks_suite import run_deepchecks; print(run_deepchecks([{'text':'a','label':'Stoicism'}]))"

      - name: Build Docker image
        run: docker build -t philosophical-engine:ci .
