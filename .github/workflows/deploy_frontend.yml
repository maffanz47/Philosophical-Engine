name: Deploy Frontend to GitHub Pages

# ── Trigger: ONLY on push to feature/affan-frontend ───────────────────────
# CRITICAL: Do NOT change this to 'main' or '*'. This pipeline is strictly
# scoped to the feature branch per project requirements.
on:
  push:
    branches:
      - feature/affan-frontend
    paths:
      - 'docs/**'           # Only re-deploy if frontend files change

# ── Required permissions for GitHub Pages deployment ──────────────────────
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # ── Job 1: Build ─────────────────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    # Guard: double-check branch — belt AND suspenders
    if: github.ref == 'refs/heads/feature/affan-frontend'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      # The frontend is pure static HTML/CSS/JS — no build step needed.
      # We just package the docs/ directory as the Pages artifact.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/   # Only the docs/ folder is deployed

  # ── Job 2: Deploy ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # Second guard: never deploy from any other branch
    if: github.ref == 'refs/heads/feature/affan-frontend'

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
