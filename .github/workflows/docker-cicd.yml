name: Docker Compose CI/CD

on:
  push:
    branches: [ "main", "ibr-affan-final" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker-compose-test:
    name: Test Docker Compose Setup
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Compose Services
        # Test that both the trainer and backend images can build successfully
        run: docker compose build

      - name: Test Complete Setup Build
        # Also ensure the multi-stage complete dockerfile builds
        run: docker build -f Docker/docker_complete.dockerfile -t philo-complete:test .
