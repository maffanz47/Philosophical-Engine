version: '3.8'

services:
  # The trainer service: runs model training and saves artifacts to volume
  trainer:
    build:
      context: .
      dockerfile: Docker/model_training.dockerfile
    env_file:
      - .env
    volumes:
      - ./engine_artifacts:/app/engine_artifacts

  # The backend service: serves the FastAPI backend and static frontend
  api:
    build:
      context: .
      dockerfile: Docker/backend.dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./engine_artifacts:/app/engine_artifacts
    depends_on:
      trainer:
        condition: service_completed_successfully
