<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Philosophical Text Engine</title>
  <meta name="description"
    content="Classify philosophical text into branches and schools of thought using a hybrid SVM + Neural Network pipeline." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="App.css" />
</head>

<body>

  <!-- ── Header ────────────────────────────────────────────────────────────── -->
  <header>
    <div class="logo-container">
      <div class="logo-pill">⚗️</div>
      <h1>Philosophical Text Engine</h1>
    </div>
    <div class="status-indicator">
      <div class="status-dot"></div>
      Model Status: Ready
    </div>
  </header>

  <!-- ── Main ──────────────────────────────────────────────────────────────── -->
  <main>
    <!-- Input Section -->
    <div class="input-section">
      <textarea id="text-input" placeholder="Paste or type a philosophical passage here…&#10;&#10;e.g. &quot;The will to power is the fundamental drive…&quot;" maxlength="5000" aria-label="Philosophical text input"></textarea>
      
      <div class="input-footer">
        <div class="url-row">
          <label for="api-url">API URL</label>
          <input id="api-url" type="url" value="http://localhost:8000/predict" />
        </div>
        <span id="char-count">0 characters</span>
      </div>

      <div style="margin-top: 16px; display: flex; justify-content: flex-end;">
        <button id="classify-btn" onclick="classify()">
          <div class="spinner" id="spinner"></div>
          <span id="btn-label">Classify Passage</span>
        </button>
      </div>
    </div>

    <!-- Error banner -->
    <div id="error-banner" role="alert"></div>

    <!-- Results Dashboard -->
    <div id="results">
      <div class="dashboard-grid">
        <!-- Classification Card -->
        <div class="glass-card fade-in">
          <div class="card-title">Classification</div>
          <div class="result-school" id="result-school-name">—</div>
          <div class="result-branch" id="result-branch-name">—</div>
          <div class="confidence-pill" id="confidence-meter">Confidence: 0%</div>
        </div>

        <!-- Complexity Index Card -->
        <div class="glass-card fade-in">
          <div class="card-title">Complexity Index</div>
          <div class="complexity-value" id="complexity-value">0.00</div>
          <div class="complexity-track">
            <div class="complexity-dot" id="complexity-dot" style="left: 0%;"></div>
          </div>
          <div class="complexity-labels">
            <span>Simple</span>
            <span>Abstract/Dense</span>
          </div>
        </div>
      </div>

      <!-- Librarian Recommendations Card -->
      <div class="glass-card fade-in" id="librarian-card">
        <div class="card-title">The Librarian (Recommendations)</div>
        <div class="librarian-scroll" id="librarian-scroll">
          <!-- Populated via JS -->
        </div>
      </div>

      <!-- Unsupervised Analysis Card -->
      <div class="glass-card fade-in" id="unsupervised-card">
        <div class="card-title">Unsupervised Text Analysis</div>
        <div class="scatter-wrap">
          <canvas id="scatter-canvas" width="820" height="400"></canvas>
        </div>
        <div id="scatter-legend" style="display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; font-size: 0.8rem; color: var(--text-dim);"></div>
      </div>
    </div>

  </main>

  <footer>
    Built by <a href="https://github.com/maffanz47/Philosophical-Engine" target="_blank" rel="noopener">Affan, Hassan, GOAT, Shahnawaz</a>
  </footer>

  <script>
    /* ── Char counter ─────────────────────────────────────────────────────── */
    const textarea = document.getElementById('text-input');
    const charCount = document.getElementById('char-count');
    textarea.addEventListener('input', () => {
      charCount.textContent = `${textarea.value.length.toLocaleString()} characters`;
    });

    /* ── Scatter plot state ───────────────────────────────────────────────── */
    const SCHOOL_COLORS = {
      'Idealism': '#10B981', 
      'Materialism': '#4B5563',
      'Rationalism': '#6366F1',
      'Empiricism': '#F43F5E',
      'Existentialism': '#F59E0B',
      'Nihilism': '#8B5CF6',
      'Stoicism': '#06B6D4',
    };
    let _metaCache = null;
    let _userPoint = null;
    let _animFrame = 0;

    /* ── Classify ─────────────────────────────────────────────────────────── */
    async function classify() {
      const text = textarea.value.trim();
      const apiUrl = document.getElementById('api-url').value.trim();
      const btn = document.getElementById('classify-btn');
      const spinner = document.getElementById('spinner');
      const lbl = document.getElementById('btn-label');
      const errBan = document.getElementById('error-banner');
      const results = document.getElementById('results');

      if (!text) { showError('Please enter a philosophical passage first.'); return; }
      if (text.length < 20) { showError('Passage must be at least 20 characters.'); return; }

      btn.disabled = true;
      spinner.style.display = 'block';
      lbl.style.display = 'none';
      errBan.style.display = 'none';
      results.style.display = 'none';

      try {
        const response = await fetch(apiUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });

        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err.detail || `Server returned ${response.status}`);
        }

        const data = await response.json();

        if (!_metaCache) {
          const metaUrl = apiUrl.replace(/\/predict$/, '/meta');
          try {
            const mRes = await fetch(metaUrl);
            _metaCache = await mRes.json();
            buildLegend(_metaCache);
          } catch (e) { console.warn('Could not load /meta', e); }
        }

        renderResults(data);

      } catch (e) {
        showError(`Request failed: ${e.message}`);
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
        lbl.style.display = 'block';
      }
    }

    /* ── Render results ──────────────────────────────────────────────────── */
    function renderResults(d) {
      const results = document.getElementById('results');

      // Classification
      const school = d.nn_tier2 ? d.nn_tier2.label : d.svm_label || 'Unknown School';
      const branch = d.nn_tier1 ? d.nn_tier1.label : 'Unknown Branch';
      
      let prob = 0;
      if (d.nn_tier2 && d.nn_tier2.probabilities && d.nn_tier2.probabilities[school]) {
        prob = d.nn_tier2.probabilities[school];
      }

      document.getElementById('result-school-name').textContent = school;
      document.getElementById('result-branch-name').textContent = branch;
      document.getElementById('confidence-meter').textContent = `Confidence: ${(prob * 100).toFixed(1)}%`;

      // Complexity
      const compVal = d.complexity !== undefined ? d.complexity : Math.random(); // Mock if missing
      document.getElementById('complexity-value').textContent = compVal.toFixed(2);
      document.getElementById('complexity-dot').style.left = `${Math.min(Math.max(compVal * 100, 0), 100)}%`;

      // Recommendations (Librarian)
      const libScroll = document.getElementById('librarian-scroll');
      libScroll.innerHTML = '';
      
      const recs = d.recommendations || [
        { title: "Beyond Good and Evil", author: "Friedrich Nietzsche" },
        { title: "Meditations", author: "Marcus Aurelius" },
        { title: "Critique of Pure Reason", author: "Immanuel Kant" },
        { title: "The Republic", author: "Plato" }
      ];

      recs.forEach(r => {
        const div = document.createElement('div');
        div.className = 'book-card';
        div.innerHTML = `
          <div class="book-title">${r.title || 'Unknown Title'}</div>
          <div class="book-author">${r.author || r.philosopher || 'Unknown Author'}</div>
        `;
        libScroll.appendChild(div);
      });

      // Scatter
      _userPoint = { x: d.pca_x || 0, y: d.pca_y || 0, cluster: d.kmeans_cluster || 0 };

      results.style.display = 'flex';
      results.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function getColor(name) {
      return SCHOOL_COLORS[name] || '#9CA3AF';
    }

    /* Draw everything on the canvas */
    function drawScatter(meta, userPt) {
      const canvas = document.getElementById('scatter-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const PAD = 40;

      ctx.clearRect(0, 0, W, H);

      if (!meta || !meta.cluster_centers_2d) return;

      const allX = meta.cluster_centers_2d.map(c => c[0]);
      const allY = meta.cluster_centers_2d.map(c => c[1]);
      if (userPt) { allX.push(userPt.x); allY.push(userPt.y); }

      const minX = Math.min(...allX) - 0.2;
      const maxX = Math.max(...allX) + 0.2;
      const minY = Math.min(...allY) - 0.2;
      const maxY = Math.max(...allY) + 0.2;

      function toCanvasX(v) { return PAD + (v - minX) / (maxX - minX) * (W - 2 * PAD); }
      function toCanvasY(v) { return H - PAD - (v - minY) / (maxY - minY) * (H - 2 * PAD); }

      // Cluster bubbles
      meta.cluster_centers_2d.forEach((coord, idx) => {
        const name = meta.cluster_names ? meta.cluster_names[idx] : 'Cluster';
        const color = getColor(name);
        const cx = toCanvasX(coord[0]);
        const cy = toCanvasY(coord[1]);
        const r = 24;

        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = color + '22'; ctx.fill();
        ctx.strokeStyle = color + '66'; ctx.lineWidth = 1; ctx.stroke();

        ctx.fillStyle = color;
        ctx.font = '500 11px Inter, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(name, cx, cy);
      });

      // User point
      if (userPt) {
        const ux = toCanvasX(userPt.x);
        const uy = toCanvasY(userPt.y);
        
        ctx.beginPath(); ctx.arc(ux, uy, 6, 0, Math.PI * 2);
        ctx.fillStyle = '#10B981'; ctx.fill();
        ctx.strokeStyle = '#0A0A0A'; ctx.lineWidth = 2; ctx.stroke();

        ctx.fillStyle = '#F3F4F6';
        ctx.font = '500 11px Inter, sans-serif';
        ctx.textAlign = 'center'; ctx.textBaseline = 'top';
        ctx.fillText('Your Text', ux, uy + 12);
      }
    }

    function animateScatter() {
      if (_metaCache && _userPoint) {
        _animFrame++;
        drawScatter(_metaCache, _userPoint);
      }
      requestAnimationFrame(animateScatter);
    }
    requestAnimationFrame(animateScatter);

    function buildLegend(meta) {
      const legend = document.getElementById('scatter-legend');
      legend.innerHTML = '';
      if (!meta.cluster_names) return;
      const seen = new Set();
      meta.cluster_names.forEach(name => {
        if (seen.has(name)) return;
        seen.add(name);
        const item = document.createElement('div');
        item.style.display = 'flex';
        item.style.alignItems = 'center';
        item.style.gap = '6px';
        item.innerHTML = `<div style="width:8px;height:8px;border-radius:50%;background:${getColor(name)}"></div>${name}`;
        legend.appendChild(item);
      });
    }

    function showError(msg) {
      const errBan = document.getElementById('error-banner');
      errBan.textContent = msg;
      errBan.style.display = 'block';
    }

    textarea.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') classify();
    });
  </script>
</body>
</html>
